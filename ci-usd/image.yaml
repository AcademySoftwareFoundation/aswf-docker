name: "usd"
title: "OpenUSD CI Docker Image"
description: |
  Contains: Python, Qt, PySide and other OpenUSD upstream dependencies
  Warning: this image does *not* contain OpenUSD itself as it is used to *build* OpenUSD!
packages:
  - openusd # all dependencies will be installed except openusd itself
implicit_packages:
  - numpy
  - vfxplatform
docker_from: ${ASWF_ORG}/ci-common:${CI_COMMON_VERSION}-clang${ASWF_CLANG_MAJOR_VERSION}
docker_package_version: $ASWF_VFXPLATFORM_VERSION
docker_post_commands: |
  RUN pip3 install jinja2 PyOpenGL
